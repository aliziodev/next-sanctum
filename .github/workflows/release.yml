name: release

# Auto-publish to npm when a version tag is pushed (`git tag v0.1.1 && git push --tags`).
# Auth works with EITHER of these — set up one:
#   A) Trusted Publishing (OIDC, recommended, no secret): npmjs.com → next-sanctum →
#      Settings → Trusted Publisher → GitHub Actions → repo `aliziodev/next-sanctum`,
#      workflow `release.yml`. Needs `id-token: write` (set below) + npm >= 11.5.
#   B) Automation token: npm → Access Tokens → Generate → Automation (bypasses 2FA) →
#      add it as the GitHub repo secret `NPM_TOKEN`.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance + Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      # npm >= 11.5 enables OIDC Trusted Publishing + provenance.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Verify the tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          test "$PKG" = "$TAG" || { echo "::error::tag v$TAG != package.json $PKG"; exit 1; }

      # `prepublishOnly` (typecheck + test + build + attw) runs automatically here.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
